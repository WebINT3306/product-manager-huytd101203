<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sản phẩm</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        .form-container { background: #f8f9fa; padding: 20px; border: 1px solid #ddd; margin-bottom: 20px; border-radius: 5px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: inline-block; width: 120px; font-weight: bold; }
        .form-group input { padding: 6px; width: 250px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background: #218838; }
        
        /* CSS khuyến khích trong yêu cầu 4.4 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #007bff; color: white; cursor: pointer; }
        th:hover { background-color: #0056b3; }
        tbody tr:nth-child(even) { background-color: #f2f2f2; } /* Màu nền xen kẽ */
        tbody tr:hover { background-color: #e2eef9; } /* Highlight khi hover */
    </style>
</head>
<body>

    <h2>Thêm sản phẩm mới</h2>
    <div class="form-container">
        <div class="form-group">
            <label>Tên sản phẩm:</label>
            <input type="text" id="input-name" placeholder="Ít nhất 3 ký tự">
        </div>
        <div class="form-group">
            <label>Danh mục:</label>
            <input type="text" id="input-category" placeholder="Danh mục">
        </div>
        <div class="form-group">
            <label>Đơn giá:</label>
            <input type="number" id="input-price" placeholder="Số dương">
        </div>
        <div class="form-group">
            <label>Số lượng:</label>
            <input type="number" id="input-quantity" placeholder="Số nguyên >= 1">
        </div>
        <button id="btn-add">Thêm sản phẩm</button>
    </div>

    <h2>Danh sách Sản phẩm</h2>
    <table id="product-table">
        <thead>
            <tr>
                <th>STT</th>
                <th id="th-name">Tên sản phẩm <span id="sort-icon"></span></th>
                <th>Danh mục</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script>
    var products = [];
    var sortAsc = null;

    function renderTable() {
      var tbody = document.querySelector('#product-table tbody');
      tbody.innerHTML = ''; 

      products.forEach(function(p, index) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + (index + 1) + '</td>' +          
          '<td>' + p.name + '</td>' +
          '<td>' + p.category + '</td>' +
          '<td>' + p.price + '</td>' +  
          '<td>' + p.quantity + '</td>';
        tbody.appendChild(tr);
      });
    }

    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'products.json', false); 
    xhr.send();
    
    if (xhr.status === 200) {
      products = JSON.parse(xhr.responseText);
      renderTable();
    }

    // --- Sắp xếp bảng khi click tiêu đề cột Tên sản phẩm ---
    var thName = document.getElementById('th-name');
    thName.addEventListener('click', function() {
      if (sortAsc === null || sortAsc === false) {
        sortAsc = true;
      } else {
        sortAsc = false;
      }

      products.sort(function(a, b) {
        return sortAsc ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);
      });

      thName.textContent = 'Tên sản phẩm ' + (sortAsc ? '▲' : '▼');
      renderTable();
    });

    document.getElementById('btn-add').addEventListener('click', function() {
      var name     = document.getElementById('input-name').value.trim();
      var category = document.getElementById('input-category').value.trim();
      var price    = parseFloat(document.getElementById('input-price').value);
      var quantity = parseInt(document.getElementById('input-quantity').value, 10);
      var errorMsg = document.getElementById('error-msg');

      if (!name || name.length < 3) {
        errorMsg.textContent = 'Tên sản phẩm không được rỗng và phải có ít nhất 3 ký tự.';
        return;
      }
      if (isNaN(price) || price <= 0) {
        errorMsg.textContent = 'Đơn giá phải là số dương.';
        return;
      }
      if (isNaN(quantity) || quantity < 1 || !Number.isInteger(quantity)) {
        errorMsg.textContent = 'Số lượng phải là số nguyên lớn hơn hoặc bằng 1.';
        return;
      }

      errorMsg.textContent = ''; 

      var newProduct = {
        id: products.length + 1,        
        name: name,
        category: category || 'Khác',   
        price: price,
        quantity: quantity
      };
      products.push(newProduct);

      sortAsc = null;
      thName.textContent = 'Tên sản phẩm'; 
      renderTable();

      document.getElementById('input-name').value = '';
      document.getElementById('input-category').value = '';
      document.getElementById('input-price').value = '';
      document.getElementById('input-quantity').value = '';
    });
    </script>
</body>
</html>
