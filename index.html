<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sản phẩm</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        .form-container { background: #f8f9fa; padding: 20px; border: 1px solid #ddd; margin-bottom: 20px; border-radius: 5px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: inline-block; width: 120px; font-weight: bold; }
        .form-group input { padding: 6px; width: 250px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background: #218838; }
        
        /* CSS khuyến khích trong yêu cầu 4.4 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #007bff; color: white; cursor: pointer; }
        th:hover { background-color: #0056b3; }
        tbody tr:nth-child(even) { background-color: #f2f2f2; } /* Màu nền xen kẽ */
        tbody tr:hover { background-color: #e2eef9; } /* Highlight khi hover */
    </style>
</head>
<body>

    <h2>Thêm sản phẩm mới</h2>
    <div class="form-container">
        <div class="form-group">
            <label>Tên sản phẩm:</label>
            <input type="text" id="input-name" placeholder="Ít nhất 3 ký tự">
        </div>
        <div class="form-group">
            <label>Danh mục:</label>
            <input type="text" id="input-category" placeholder="Danh mục">
        </div>
        <div class="form-group">
            <label>Đơn giá:</label>
            <input type="number" id="input-price" placeholder="Số dương">
        </div>
        <div class="form-group">
            <label>Số lượng:</label>
            <input type="number" id="input-quantity" placeholder="Số nguyên >= 1">
        </div>
        <button id="btn-add">Thêm sản phẩm</button>
    </div>

    <h2>Danh sách Sản phẩm</h2>
    <table id="product-table">
        <thead>
            <tr>
                <th>STT</th>
                <th id="th-name">Tên sản phẩm <span id="sort-icon"></span></th>
                <th>Danh mục</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script>
        let products = [];
        let isAscending = true;

        function loadData() {
            const xhr = new XMLHttpRequest();
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    products = JSON.parse(xhr.responseText);
                    renderTable();
                }
            };
            xhr.open('GET', 'products.json');
            xhr.send();
        }

        function renderTable() {
            const tbody = document.querySelector('#product-table tbody');
            tbody.innerHTML = ''; 
            
            products.forEach((product, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${product.name}</td>
                    <td>${product.category || ''}</td>
                    <td>${product.price}</td>
                    <td>${product.quantity}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('btn-add').addEventListener('click', function() {
            const nameInput = document.getElementById('input-name');
            const categoryInput = document.getElementById('input-category');
            const priceInput = document.getElementById('input-price');
            const quantityInput = document.getElementById('input-quantity');

            const name = nameInput.value.trim();
            const category = categoryInput.value.trim();
            const price = parseFloat(priceInput.value);
            const quantity = parseInt(quantityInput.value);

            if (name.length >= 3 && price > 0 && quantity >= 1) {
                products.push({
                    id: Date.now(), 
                    name: name,
                    category: category,
                    price: price,
                    quantity: quantity
                });
                renderTable();
                
                nameInput.value = '';
                categoryInput.value = '';
                priceInput.value = '';
                quantityInput.value = '';
            } else {
                alert("Vui lòng nhập đúng: Tên >= 3 ký tự, Giá > 0, Số lượng >= 1.");
            }
        });

        document.getElementById('th-name').addEventListener('click', function() {
            const sortIcon = document.getElementById('sort-icon');
            if (isAscending) {
                products.sort((a, b) => a.name.localeCompare(b.name));
                sortIcon.innerHTML = "▲";
            } else {
                products.sort((a, b) => b.name.localeCompare(a.name));
                sortIcon.innerHTML = "▼";
            }
            isAscending = !isAscending;
            renderTable();
        });

        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
