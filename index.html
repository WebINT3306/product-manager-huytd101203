<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sản phẩm</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        .form-container { background: #f8f9fa; padding: 20px; border: 1px solid #ddd; margin-bottom: 20px; border-radius: 5px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: inline-block; width: 120px; font-weight: bold; }
        .form-group input { padding: 6px; width: 250px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background: #218838; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #007bff; color: white; }
        #th-name { cursor: pointer; }
        #th-name:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h2>Thêm sản phẩm mới</h2>
    <div class="form-container">
        <div class="form-group">
            <label>Tên sản phẩm:</label>
            <input type="text" id="input-name" placeholder="Ít nhất 3 ký tự">
        </div>
        <div class="form-group">
            <label>Danh mục:</label>
            <input type="text" id="input-category" placeholder="Danh mục">
        </div>
        <div class="form-group">
            <label>Đơn giá:</label>
            <input type="number" id="input-price" placeholder="Số dương">
        </div>
        <div class="form-group">
            <label>Số lượng:</label>
            <input type="number" id="input-quantity" placeholder="Số nguyên >= 1">
        </div>
        <button id="btn-add">Thêm sản phẩm</button>
    </div>

    <h2>Danh sách Sản phẩm</h2>
    <table id="product-table">
        <thead>
            <tr>
                <th>STT</th>
                <th id="th-name">Tên sản phẩm <span id="sort-icon"></span></th>
                <th>Danh mục</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
            </tr>
        </thead>
        <tbody id="product-list">
            </tbody>
    </table>

    <script>
        var products = [];
        var isAscending = true;

        function renderTable() {
            var tbody = document.getElementById('product-list');
            if (!tbody) tbody = document.querySelector('#product-table tbody'); // Fallback
            tbody.innerHTML = ''; 
            
            for (var i = 0; i < products.length; i++) {
                var p = products[i];
                var tr = document.createElement('tr');
                tr.innerHTML = 
                    '<td>' + (i + 1) + '</td>' +
                    '<td>' + p.name + '</td>' +
                    '<td>' + (p.category ? p.category : '') + '</td>' +
                    '<td>' + p.price + '</td>' +
                    '<td>' + p.quantity + '</td>';
                tbody.appendChild(tr);
            }
        }
        function loadData() {
            var xhr = new XMLHttpRequest();
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.responseText) {
                    try {
                        products = JSON.parse(xhr.responseText);
                        renderTable();
                    } catch (e) {
                        console.error("Lỗi parse JSON: ", e);
                    }
                }
            };
            xhr.open('GET', 'products.json', true);
            xhr.send();
        }

        document.getElementById('btn-add').addEventListener('click', function() {
            var name = document.getElementById('input-name').value.trim();
            var category = document.getElementById('input-category').value.trim();
            var price = parseFloat(document.getElementById('input-price').value);
            var quantity = parseInt(document.getElementById('input-quantity').value);

            if (name.length >= 3 && price > 0 && quantity >= 1) {
                products.push({
                    id: new Date().getTime(), 
                    name: name,
                    category: category,
                    price: price,
                    quantity: quantity
                });
                renderTable();
                
                document.getElementById('input-name').value = '';
                document.getElementById('input-category').value = '';
                document.getElementById('input-price').value = '';
                document.getElementById('input-quantity').value = '';
            }
        });

        document.getElementById('th-name').addEventListener('click', function() {
            var sortIcon = document.getElementById('sort-icon');
            if (isAscending) {
                products.sort(function(a, b) {
                    if (a.name < b.name) return -1;
                    if (a.name > b.name) return 1;
                    return 0;
                });
                sortIcon.innerHTML = "▲";
            } else {
                products.sort(function(a, b) {
                    if (a.name > b.name) return -1;
                    if (a.name < b.name) return 1;
                    return 0;
                });
                sortIcon.innerHTML = "▼";
            }
            isAscending = !isAscending;
            renderTable();
        });

        loadData();
    </script>
</body>
</html>
